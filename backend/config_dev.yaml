# 开发环境配置文件
database:
  type: postgresql
  host: "${FAYHUB_DB_HOST:-localhost}"
  port: ${FAYHUB_DB_PORT:-5432}
  username: "${FAYHUB_DB_USERNAME:-fayhub}"
  password: "${FAYHUB_DB_PASSWORD}"
  database: "${FAYHUB_DB_NAME:-fayhub}"
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_sec: 3600
  conn_max_idle_time_sec: 600

server:
  port: ${FAYHUB_SERVER_PORT:-8080}
  mode: debug
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:8080"
  cors_allow_all: false
  cors_allow_credentials: true

jwt:
  secret: "${FAYHUB_JWT_SECRET}"
  expire: 168
  issuer: fayhub

logging:
  level: info
  format: json
  output: stdout
  file:
    path: ./logs
    max_size: 100
    max_backups: 10
    max_age: 30

multi_tenant:
  mode: shared

security:
  max_login_attempts: 5
  lock_duration_min: 15

plugin_engine:
  http_timeout_sec: 30

redis:
  enabled: true
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10

sso:
  clients:
    market: "fayhub-market-sso-secret-2026-dev"

domains:
  admin_url: "http://admin.fayhub.com"
  market_url: "http://market.fayhub.com:3002"
  dev_url: "http://dev.fayhub.com"
  api_url: "http://api.fayhub.com"
  sso_url: "http://sso.fayhub.com"
  www_url: "http://www.fayhub.com"