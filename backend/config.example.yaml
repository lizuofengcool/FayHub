# FayHub 配置文件
# 数据库配置
database:
  # 数据库类型：mysql / postgresql
  type: postgresql
  # 数据库地址
  host: localhost
  # 数据库端口
  port: 5432
  # 数据库用户名
  username: fayhub
  # 数据库密码
  password: fayhub123
  # 数据库名称
  database: fayhub
  # 数据库字符集
  charset: utf8mb4

# 服务配置
server:
  # 服务端口
  port: 8080
  # 运行模式：debug / release
  mode: debug

# JWT配置
jwt:
  # 签名密钥
  secret: fayhub-secret-key-2024
  # Token过期时间（小时）
  expire: 168
  # 签发者
  issuer: fayhub

# Redis配置
redis:
  # 是否启用Redis（false时使用内存降级存储）
  enabled: false
  # Redis地址
  host: localhost
  # Redis端口
  port: 6379
  # Redis密码（无密码留空）
  password: ""
  # Redis数据库编号
  db: 0
  # 连接池大小
  pool_size: 10

# SSO配置
sso:
  # SSO客户端配置（client_id → client_secret）
  clients:
    market: "your-market-sso-secret-here"

# 域名配置
domains:
  admin_url: "http://admin.fayhub.com"
  market_url: "http://www.fayhub.com"
  dev_url: "http://dev.fayhub.com"
  api_url: "http://api.fayhub.com"
  sso_url: "http://sso.fayhub.com"
  www_url: "http://www.fayhub.com"
