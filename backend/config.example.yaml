# FayHub 配置文件
# 数据库配置
database:
  # 数据库类型：mysql / postgresql
  type: postgresql
  # 数据库地址
  host: localhost
  # 数据库端口
  port: 5432
  # 数据库用户名
  username: fayhub
  # 数据库密码
  password: fayhub123
  # 数据库名称
  database: fayhub
  # 数据库字符集
  charset: utf8mb4

# 服务配置
server:
  # 服务端口
  port: 8080
  # 运行模式：debug / release
  mode: debug

# JWT配置
jwt:
  # 签名密钥
  secret: fayhub-secret-key-2024
  # Token过期时间（小时）
  expire: 168
  # 签发者
  issuer: fayhub
