# FayHub 开发环境 Nginx 配置（HTTP 模式）
# 版本: 4.0 - Dev (Updated 2026-04-28)
# 用途: 本地开发环境反向代理（无需 SSL 证书）
# 修复: api→Go(8080), admin→Vue(3000), www/dev→Next.js(3002)
# 使用方法:
#   1. 在 nginx.conf 中添加: include fayhub-dev.conf;
#   2. 重启 Nginx: nginx -s reload

# ==================== 上游服务定义（本地开发） ====================
# 基座后端 API（Go + Gin）
upstream api_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# 市场后端 API（NestJS）
upstream market_api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# 基座管理后台前端（Vue + Vite + Element Plus）
upstream admin_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# 市场前端（Next.js App Router，www / dev 由 Route Groups + Middleware 区分）
upstream market_frontend {
    server 127.0.0.1:3002;
    keepalive 16;
}

# ==================== API 服务 (api.fayhub.com:80) ====================
server {
    listen 80;
    server_name api.fayhub.com;

    # CORS 配置（开发环境允许所有来源）
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;

    # 处理预检请求
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # 市场 API 代理（/market-api/ 前缀路由到 NestJS）
    location /market-api/ {
        rewrite ^/market-api/(.*) /api/$1 break;
        proxy_pass http://market_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 基座 API 代理（默认路由到 Go 后端）
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# ==================== 管理后台 (admin.fayhub.com:80) ====================
server {
    listen 80;
    server_name admin.fayhub.com;

    # 静态资源缓存（开发环境短缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 应用（Vue + Vite）
    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ==================== 插件市场/主站 (www.fayhub.com:80) ====================
server {
    listen 80;
    server_name www.fayhub.com fayhub.com;

    # 市场 API 代理（/market-api/ 前缀路由到 NestJS）
    location /market-api/ {
        rewrite ^/market-api/(.*) /api/$1 break;
        proxy_pass http://market_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        proxy_pass http://market_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 应用（由 middleware 根据 Host 头内部 rewrite 到 /market）
    location / {
        proxy_pass http://market_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

