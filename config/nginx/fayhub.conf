# FayHub 生产环境 Nginx 配置
# 版本: 1.1 (Updated 2026-05-02)
# 用途: 统一管理所有子域名的反向代理和负载均衡
# 变更: 移除 market.fayhub.com，市场前端统一走 www.fayhub.com
# 使用方法: 复制此文件到 D:/Program Files/nginx-1.26.3/conf/fayhub.conf
#          并在 nginx.conf 中添加: include conf/fayhub.conf;

# ==================== 上游服务定义 ====================
# 后端 API 服务（Go）
upstream api_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# 管理后台前端（Vue）
upstream admin_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# 插件市场前端
upstream www_frontend {
    server 127.0.0.1:3002;
    keepalive 16;
}

# 开发者中心前端（合并到市场前端 Next.js Route Groups）
upstream dev_frontend {
    server 127.0.0.1:3002;
    keepalive 16;
}

# ==================== HTTPS 全局配置 ====================
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# 现代 SSL 配置
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# HSTS (HTTP Strict Transport Security)
add_header Strict-Transport-Security "max-age=63072000" always;

# ==================== HTTP -> HTTPS 重定向 ====================
server {
    listen 80;
    server_name admin.fayhub.com api.fayhub.com www.fayhub.com dev.fayhub.com sso.fayhub.com;
    
    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== API 服务 (api.fayhub.com) ====================
server {
    listen 443 ssl http2;
    server_name api.fayhub.com;

    # SSL 证书配置（需要替换为实际证书路径）
    ssl_certificate     certs/api.fayhub.com.pem;
    ssl_certificate_key certs/api.fayhub.com.key;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS 配置
    add_header Access-Control-Allow-Origin "https://admin.fayhub.com, https://www.fayhub.com, https://dev.fayhub.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # 处理预检请求
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # API 限流
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;

    # 反向代理到后端
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # 缓冲区设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# ==================== 管理后台 (admin.fayhub.com) ====================
server {
    listen 443 ssl http2;
    server_name admin.fayhub.com;

    # SSL 证书
    ssl_certificate     certs/admin.fayhub.com.pem;
    ssl_certificate_key certs/admin.fayhub.com.key;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS 配置
    add_header Access-Control-Allow-Origin "https://admin.fayhub.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # 处理预检请求
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # API 请求转发到后端
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_pass http://admin_frontend;
    }

    # SPA 应用路由
    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 尝试静态文件，不存在则返回 index.html（SPA 支持）
        try_files $uri $uri/ /index.html;
    }
}

# ==================== 插件市场/主站 (www.fayhub.com) ====================
server {
    listen 443 ssl http2;
    server_name www.fayhub.com;

    # SSL 证书
    ssl_certificate     certs/www.fayhub.com.pem;
    ssl_certificate_key certs/www.fayhub.com.key;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Next.js 静态资源缓存（含 basePath: /market 前缀）
    location ~* ^/market/_next/static/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_pass http://www_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 通用静态资源缓存（非 /market 前缀路径）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_pass http://www_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 应用（不使用 try_files，所有请求直接代理）
    location / {
        proxy_pass http://www_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

