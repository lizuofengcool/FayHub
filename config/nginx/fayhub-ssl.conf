# FayHub HTTPS 配置（本地开发 SSL 模式）
# 版本: 5.2 - HTTPS (Updated 2026-05-02)
# 证书: FayHub Local CA (C:\ssl\fayhub-ca.crt)
# 变更: 移除 market.fayhub.com，市场前端统一走 www.fayhub.com
# 使用方法:
#   1. 先以管理员身份运行 C:\ssl\install-ca.bat 导入CA
#   2. 在 nginx.conf 中将 include fayhub-dev.conf 改为 include fayhub-ssl.conf;
#   3. 重启 Nginx: nginx -s reload

# ==================== SSL 全局参数 ====================
ssl_certificate     C:/ssl/fayhub-server.crt;
ssl_certificate_key C:/ssl/fayhub-server.key;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ==================== 上游服务定义 ====================
upstream api_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream market_api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream admin_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream market_frontend {
    server 127.0.0.1:3002;
    keepalive 16;
}

# ==================== HTTP → HTTPS 重定向 ====================
server {
    listen 80;
    server_name api.fayhub.com admin.fayhub.com www.fayhub.com fayhub.com dev.fayhub.com sso.fayhub.com;
    return 301 https://$host$request_uri;
}

# ==================== API 服务 (api.fayhub.com:443) ====================
server {
    listen 443 ssl;
    http2 on;
    server_name api.fayhub.com;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With, X-Service-Token" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location /market-api/ {
        rewrite ^/market-api/(.*) /api/$1 break;
        proxy_pass http://market_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# ==================== 管理后台 (admin.fayhub.com:443) ====================
server {
    listen 443 ssl;
    http2 on;
    server_name admin.fayhub.com;

    add_header Access-Control-Allow-Origin "https://admin.fayhub.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ==================== 插件市场/主站 (www.fayhub.com:443) ====================
server {
    listen 443 ssl;
    http2 on;
    server_name www.fayhub.com fayhub.com;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        proxy_pass http://market_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://market_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

